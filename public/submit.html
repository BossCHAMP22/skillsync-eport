<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-protected="true">

<header>
  <a href="index.html">
    <img class="logo" src="assets/logo.png" alt="Logo">
  </a>
  <nav>
    <a href="index.html">HOME</a>
    <a class="active">SUBMIT REQUEST</a>
    <a href="help.html">GIVE HELP</a>
    <a href="messages.html">MESSAGE</a>
  </nav>
  <a id="loginBtn" class="login-btn" href="login.html">LOGIN</a>
</header>

<div class="main">
  <h2><span style="color:#ffcc00;">SUBMIT</span> REQUESTS HERE</h2>

  <div class="form-box">
    <form id="requestForm">

      <label>Category</label>
      <select id="category" required>
        <option value="Academics">Academics</option>
        <option value="Music">Music</option>
        <option value="Personal">Personal</option>
      </select>

      <label>Title</label>
      <input type="text" id="title" required>

      <label>Description</label>
      <textarea rows="4" id="description" required></textarea>

      <button type="submit">SUBMIT</button>

    </form>

    <p id="status"></p>
  </div>
</div>

<script type="module" src="js/requests.js"></script>
<script type="module" src="js/guard.js"></script>
</body>
</html>
