<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

<header>
  <a href="index.html">
    <img class="logo" src="assets/logo.png" alt="Logo">
  </a>
  <nav>
    <a href="index.html">HOME</a>
    <a href="submit.html">SUBMIT REQUEST</a>
    <a href="help.html">GIVE HELP</a>
    <a href="messages.html">MESSAGE</a>
  </nav>
  <a id="loginBtn" class="login-btn active" href="login.html">LOGIN</a>
</header>

<div class="form-box">
  <h2 style="font-family: 'Noto Serif', serif;">Login</h2>

  <form id="loginForm">
    <label>Email</label>
    <input type="email" id="email" required>

    <label>Password</label>
    <input type="password" id="password" required>

    <button type="submit">LOGIN</button>
  </form>

  <p id="loginMessage"></p>
  <p style="margin-top:15px;">
  Don't have an account?
  <a href="signup.html" style="color:#ffcc00;">Sign up here</a>
</p>

</div>

<script type="module" src="js/auth.js"></script>
<script type="module" src="js/guard.js"></script>
</body>
</html>
