<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="css/style.css">
  <title>Sign Up</title>
</head>
<body class="login-page">

<header>
  <a href="index.html">
    <img class="logo" src="assets/logo.png" alt="Logo">
  </a>
  <nav>
    <a href="index.html">HOME</a>
    <a href="submit.html">SUBMIT REQUEST</a>
    <a href="help.html">GIVE HELP</a>
    <a href="messages.html">MESSAGE</a>
  </nav>
  <a id="loginBtn" class="login-btn" href="login.html">LOGIN</a>
</header>

<div class="form-box">
  <h2>Create Account</h2>

  <form id="signupForm">
    <label>Full Name</label>
    <input type="text" id="fullName" required>

    <label>Year Group</label>
    <select id="yearGroup" required>
      <option>Year 7</option>
      <option>Year 8</option>
      <option>Year 9</option>
      <option>Year 10</option>
      <option>Year 11</option>
      <option>Year 12</option>
      <option>Year 13</option>
    </select>

    <label>Email</label>
    <input type="email" id="email" required>

    <label>Password</label>
    <input type="password" id="password" required>

    <button type="submit">SIGN UP</button>
  </form>

  <p id="signupMessage"></p>
</div>

<script type="module" src="js/signup.js"></script>
<script type="module" src="js/guard.js"></script>
</body>
</html>
