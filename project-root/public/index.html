<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SkillSync</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="site">
  <header class="topbar">
    <div class="left">
      <img src="logo.png" alt="Logo" class="logo">
    </div>

    <nav class="nav">
      <a href="index.html" class="active">HOME</a>
      <a href="submit.html">SUBMIT REQUEST</a>
      <a href="give.html">GIVE HELP</a>
      <a href="message.html">MESSAGE</a>
      <a href="profile.html">PROFILE</a>
    </nav>

    <div class="right">
      <div id="userDisplay" class="user-display">Not signed in</div>
      <button id="authBtn" class="btn-primary small">Sign In</button>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1 class="brand"><span class="brand-top">SKILL</span><span class="brand-btm">SYNC</span></h1>
      <p class="subtitle">SUBTITLE</p>
    </section>

    <section class="features">
      <article class="card feature">
        <img src="gethelp.jpg" alt="Student helping another student, writing in notebook">
        <p class="caption">Submit your requests here!</p>
      </article>
      <article class="card feature">
        <img src="givehelp.png" alt="Student raising hand, asking for help">
        <p class="caption">Share your expertise!</p>
      </article>
      <article class="card feature">
        <img src="message.png" alt="Messaging on phone">
        <p class="caption">Connect directly with peers!</p>
      </article>
    </section>
  </main>

  <script type="module" src="js/firebase-init.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
